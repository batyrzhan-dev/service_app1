volumes:
  db:

networks:
  backend:
  frontend:

services:
  app:
    image: webdevops/php-nginx:8.4
    container_name: service_app
    ports:
      - "9092:80"
      - "443:443"
    environment:
      - WEB_DOCUMENT_ROOT=/app/public
      - "php.short_open_tag=On"
      - "php.error_reporting=E_ALL & ~E_NOTICE & ~E_DEPRECATED"
      - "php.openssl.cafile=/usr/lib/ssl/cert.pem"
      - "php.openssl.capath=/usr/lib/ssl/"
      - "php.curl.cainfo=/usr/lib/ssl/cert.pem"
      - PHP_DATE_TIMEZONE=Asia/Almaty
      - PHP_MAX_EXECUTION_TIME=600
    volumes:
      - ./:/app
      - ./docker/app/ssl:/usr/lib/ssl
      # 2 files: server.crt, server.key
      # - ./docker/app/ssl:/opt/docker/etc/nginx/ssl/
    networks:
      - backend
      - frontend
  db:
    image: mariadb:lts
    container_name: service_db
    ports:
      - "3306:3306"
    environment:
    - MARIADB_DATABASE=${DB_DATABASE}
    - MARIADB_USER=${DB_USERNAME}
    - MARIADB_PASSWORD=${DB_PASSWORD}
    - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    volumes:
      - db:/var/lib/mysql
    networks:
      - backend
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: service_phpmyadmin
    ports:
      - "81:80"
    depends_on:
      - db
    environment:
      - PMA_HOST=db
      - PMA_ARBITRARY=1
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    networks:
      - backend
